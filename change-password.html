<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Listahan — Change Password</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔐</text></svg>">
  <link rel="stylesheet" href="styles/style.css">
  <style>
    .auth-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .auth-card {
      max-width: 400px;
      width: 100%;
      background: var(--bg-card);
      border-radius: 24px;
      padding: 2rem;
      border: 1px solid var(--border-color);
    }
    .auth-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .auth-header h1 {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      color: var(--accent);
    }
    .auth-header p {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }
    .form-group {
      margin-bottom: 1.25rem;
    }
    .form-label {
      display: block;
      margin-bottom: 0.5rem;
      color: var(--text-primary);
      font-weight: 500;
      font-size: 0.9rem;
    }
    .form-control {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg-input);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      color: var(--text-primary);
      font-size: 1rem;
      transition: all 0.2s;
    }
    .form-control:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(var(--accent-rgb), 0.1);
    }
    .btn-submit {
      width: 100%;
      padding: 0.875rem;
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 1rem;
    }
    .btn-submit:hover {
      opacity: 0.9;
      transform: translateY(-2px);
    }
    .btn-submit:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .step-indicator {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 2rem;
      justify-content: center;
    }
    .step {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--border-color);
      transition: all 0.3s;
    }
    .step.active {
      background: var(--accent);
      width: 30px;
      border-radius: 5px;
    }
    .error-message {
      color: #f44336;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      text-align: center;
    }
    .success-message {
      color: #4caf50;
      font-size: 0.9rem;
      margin-top: 0.5rem;
      text-align: center;
    }
    .back-link {
      text-align: center;
      margin-top: 1rem;
    }
    .back-link a {
      color: var(--text-secondary);
      text-decoration: none;
      font-size: 0.9rem;
    }
    .back-link a:hover {
      color: var(--accent);
    }
    .password-requirements {
      font-size: 0.8rem;
      color: var(--text-secondary);
      margin-top: 0.25rem;
    }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div id="loadingScreen">
  <div class="loading-logo">🎌 Listahan</div>
  <div class="loading-bar-wrap"><div class="loading-bar"></div></div>
</div>

<div class="auth-container">
  <div class="auth-card">
    <div class="auth-header">
      <h1>🔐 Change Password</h1>
      <p>Reset your password using your hint question</p>
    </div>

    <!-- Step Indicator -->
    <div class="step-indicator">
      <div class="step active" id="step1"></div>
      <div class="step" id="step2"></div>
      <div class="step" id="step3"></div>
    </div>

    <!-- Step 1: Username -->
    <div id="step1-content">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter your username" autocomplete="off">
      </div>
      <button class="btn-submit" onclick="nextStep()">Next</button>
      <div id="step1-error" class="error-message"></div>
    </div>

    <!-- Step 2: Hint Answer -->
    <div id="step2-content" style="display: none;">
      <div class="form-group">
        <label class="form-label" id="hintQuestion">Hint Question</label>
        <input type="text" id="hintAnswer" class="form-control" placeholder="Enter your hint answer">
      </div>
      <button class="btn-submit" onclick="verifyHint()">Verify Answer</button>
      <button class="btn-submit" style="background: var(--bg-card); color: var(--text-primary); margin-top: 0.5rem;" onclick="goBack()">Back</button>
      <div id="step2-error" class="error-message"></div>
    </div>

    <!-- Step 3: New Password -->
    <div id="step3-content" style="display: none;">
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" id="newPassword" class="form-control" placeholder="Enter new password">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="confirmPassword" class="form-control" placeholder="Confirm new password">
      </div>
      <p class="password-requirements">Password must be at least 6 characters</p>
      <button class="btn-submit" onclick="changePassword()">Change Password</button>
      <button class="btn-submit" style="background: var(--bg-card); color: var(--text-primary); margin-top: 0.5rem;" onclick="goToStep(2)">Back</button>
      <div id="step3-error" class="error-message"></div>
      <div id="step3-success" class="success-message"></div>
    </div>

    <div class="back-link">
      <a href="login.html">← Back to Login</a>
    </div>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/database.js"></script>
<script src="js/auth.js"></script>
<script src="js/notification.js"></script>

<script>
  let currentStep = 1;
  let verifiedUser = '';

  // Hide loading screen
  window.addEventListener('load', () => {
    setTimeout(() => {
      const ls = document.getElementById('loadingScreen');
      if (ls) { 
        ls.classList.add('hide'); 
        setTimeout(() => ls.remove(), 500); 
      }
    }, 800);
  });

  function nextStep() {
    const username = document.getElementById('username').value.trim();
    if (!username) {
      showError('step1-error', 'Please enter your username');
      return;
    }

    // Check if user exists
    checkUserExists(username);
  }

  async function checkUserExists(username) {
    const btn = document.querySelector('#step1-content .btn-submit');
    btn.disabled = true;
    btn.textContent = 'Checking...';

    try {
      // We'll use a simple check by trying to get the hint question
      const response = await Database.request({
        action: 'verifyHint',
        username: username,
        hintAnswer: 'dummy' // This will fail but we'll get the error
      });

      if (response && response.success === false && response.error === 'Incorrect hint answer') {
        // User exists! (wrong answer but user found)
        verifiedUser = username;
        document.getElementById('step1-content').style.display = 'none';
        document.getElementById('step2-content').style.display = 'block';
        document.getElementById('step2').classList.add('active');
        currentStep = 2;
        document.getElementById('hintQuestion').textContent = 'Answer your hint question:';
      } else if (response && response.error === 'Username not found') {
        showError('step1-error', 'Username not found');
      } else {
        showError('step1-error', 'Please try again');
      }
    } catch (e) {
      showError('step1-error', 'Connection error. Please try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Next';
    }
  }

  async function verifyHint() {
    const hintAnswer = document.getElementById('hintAnswer').value.trim();
    if (!hintAnswer) {
      showError('step2-error', 'Please enter your hint answer');
      return;
    }

    const btn = document.querySelector('#step2-content .btn-submit');
    btn.disabled = true;
    btn.textContent = 'Verifying...';

    try {
      const response = await Database.request({
        action: 'verifyHint',
        username: verifiedUser,
        hintAnswer: hintAnswer
      });

      if (response && response.success) {
        document.getElementById('step2-content').style.display = 'none';
        document.getElementById('step3-content').style.display = 'block';
        document.getElementById('step3').classList.add('active');
        currentStep = 3;
        clearError('step2-error');
      } else {
        showError('step2-error', response?.error || 'Incorrect answer');
      }
    } catch (e) {
      showError('step2-error', 'Connection error. Please try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Verify Answer';
    }
  }

  async function changePassword() {
    const newPassword = document.getElementById('newPassword').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (!newPassword || !confirmPassword) {
      showError('step3-error', 'Please fill in all fields');
      return;
    }

    if (newPassword.length < 6) {
      showError('step3-error', 'Password must be at least 6 characters');
      return;
    }

    if (newPassword !== confirmPassword) {
      showError('step3-error', 'Passwords do not match');
      return;
    }

    const hintAnswer = document.getElementById('hintAnswer').value.trim();

    const btn = document.querySelector('#step3-content .btn-submit');
    btn.disabled = true;
    btn.textContent = 'Changing password...';

    try {
      const response = await Database.request({
        action: 'changePassword',
        username: verifiedUser,
        hintAnswer: hintAnswer,
        newPassword: newPassword
      });

      if (response && response.success) {
        document.getElementById('step3-success').textContent = '✓ Password changed successfully!';
        setTimeout(() => {
          window.location.href = 'login.html';
        }, 2000);
      } else {
        showError('step3-error', response?.error || 'Failed to change password');
      }
    } catch (e) {
      showError('step3-error', 'Connection error. Please try again.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Change Password';
    }
  }

  function goBack() {
    goToStep(1);
  }

  function goToStep(step) {
    document.getElementById('step1-content').style.display = step === 1 ? 'block' : 'none';
    document.getElementById('step2-content').style.display = step === 2 ? 'block' : 'none';
    document.getElementById('step3-content').style.display = step === 3 ? 'block' : 'none';
    
    document.getElementById('step1').classList.toggle('active', step === 1);
    document.getElementById('step2').classList.toggle('active', step === 2);
    document.getElementById('step3').classList.toggle('active', step === 3);
    
    currentStep = step;
    
    clearError('step1-error');
    clearError('step2-error');
    clearError('step3-error');
  }

  function showError(elementId, message) {
    document.getElementById(elementId).textContent = message;
  }

  function clearError(elementId) {
    document.getElementById(elementId).textContent = '';
  }
</script>
</body>
</html>

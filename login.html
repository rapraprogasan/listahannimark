<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Listahan ng AnimeManga</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎌</text></svg>">
  <link rel="stylesheet" href="styles/auth.css">
</head>
<body data-page="login">

<!-- Left side welcome section (hidden on mobile) -->
<div class="welcome-section">
  <h1>Welcome to<br>Listahan</h1>
  <p>Your personal anime and manga tracking companion</p>
  <ul class="feature-list">
    <li>Track your watched anime</li>
    <li>Discover new manga</li>
    <li>Create your personal list</li>
    <li>Connect with other fans</li>
  </ul>
</div>

<header class="auth-header">
  <a href="index.html" class="auth-brand">🎌 Listahan</a>
  <button class="auth-theme-btn" onclick="toggleAuthTheme()">☀️</button>
</header>

<div class="auth-box">
  <!-- Header section with Hello! and subtitle -->
  <div class="auth-header-content">
    <div class="greeting">Hello!</div>
    <div class="subtitle">Sign Up to Get Started</div>
  </div>

  <form id="loginForm">
    <div class="auth-form-group">
      <label class="auth-label" for="username">Username</label>
      <input type="text" id="username" name="username" class="auth-input" placeholder="Enter your username" autocomplete="username" required>
    </div>
    
    <div class="auth-form-group">
      <label class="auth-label" for="password">Password</label>
      <div class="auth-input-wrap">
        <input type="password" id="password" name="password" class="auth-input has-icon" placeholder="Enter your password" autocomplete="current-password" required>
        <button type="button" class="toggle-pass" onclick="togglePass('password', this)">Show</button>
      </div>
    </div>

    <button type="submit" class="auth-btn">Login</button>

    <div class="auth-link-row">
      <a href="forgot-password.html" class="auth-link">Forgot Password?</a>
    </div>
  </form>

  <!-- Create one link (separate from form) -->
  <div class="auth-footer">
    <p>Don't have an account? <a href="register.html" class="auth-link">Create one</a></p>
  </div>
</div>

<script src="js/config.js"></script>
<script src="js/database.js"></script>
<script src="js/auth.js"></script>
<script src="js/notification.js"></script>
<script src="js/common.js"></script>
<script src="js/auth-page.js"></script>
<script>
  function togglePass(id, btn) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
    btn.textContent = input.type === 'password' ? 'Show' : 'Hide';
  }
  
  function toggleAuthTheme() {
    const d = document.documentElement;
    const t = d.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
    d.setAttribute('data-theme', t);
    localStorage.setItem('listahan_theme', t);
    document.querySelector('.auth-theme-btn').textContent = t === 'light' ? '☀️' : '🌙';
  }
  
  // Apply saved theme
  const t = localStorage.getItem('listahan_theme') || 'light';
  document.documentElement.setAttribute('data-theme', t);
  document.querySelector('.auth-theme-btn').textContent = t === 'light' ? '☀️' : '🌙';
</script>
</body>
</html>
